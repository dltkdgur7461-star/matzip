<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛집지도</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=378af64f053167ad79191e19a1874612&libraries=services&autoload=false"></script>
<script>window.addEventListener('load',()=>kakao.maps.load(initMap));</script>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0e;--surface:#181818;--surface2:#222;--border:#2e2e2e;
  --red:#e63946;--red-dim:#8b1a22;--gold:#f4a429;--gold-dim:#7a5214;
  --text:#efefef;--text-muted:#888;--text-dim:#555;
  --green:#2dce7a;--blue:#4fa3e0;--purple:#c084fc;
  --r:10px;--sidebar-w:410px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

header{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 14px;flex-shrink:0;z-index:50;}
.logo{font-family:'Black Han Sans',sans-serif;font-size:1.25rem;white-space:nowrap;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.search-bar{flex:1;display:flex;gap:8px;max-width:460px;}
.search-bar input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:.85rem;outline:none;transition:border-color .2s;}
.search-bar input:focus{border-color:var(--red);}
.search-bar input::placeholder{color:var(--text-dim);}

.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:700;transition:all .15s;white-space:nowrap;}
.btn-red{background:var(--red);color:#fff;}.btn-red:hover{background:#c62f3a;transform:translateY(-1px);}
.btn-gold{background:var(--gold);color:#111;}.btn-gold:hover{background:#d9911e;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted);}.btn-ghost:hover{border-color:var(--red);color:var(--red);}
.btn-danger{background:transparent;border:1px solid #5a1a1f;color:var(--red);}.btn-danger:hover{background:var(--red-dim);}
.btn-stamp{background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.35);color:var(--red);}.btn-stamp.active{background:var(--red);color:#fff;}
.btn-sm{padding:5px 9px;font-size:.73rem;}

.main-layout{flex:1;display:flex;overflow:hidden;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:.73rem;font-weight:700;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s;user-select:none;}
.tab:hover{color:var(--text);}.tab.active{color:var(--red);border-bottom-color:var(--red);background:rgba(230,57,70,.04);}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}.tab-panel.active{display:flex;}

.filters{padding:7px 9px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface2);align-items:center;}
.filters select{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:.7rem;padding:4px 6px;outline:none;cursor:pointer;}
.filters select:focus{border-color:var(--gold);}

.scroll-area{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.scroll-area::-webkit-scrollbar{width:4px;}.scroll-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ━━━ CARD ━━━ */
.rest-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;}
.rest-card:hover{border-color:var(--gold-dim);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.rest-card.selected{border-color:var(--red);box-shadow:0 0 0 2px rgba(230,57,70,.2);}
.stamp{position:absolute;top:11px;right:12px;font-family:'Black Han Sans',sans-serif;font-size:.58rem;color:#e63946;border:2px solid #e63946;border-radius:5px;padding:2px 5px;opacity:.88;letter-spacing:.06em;transform:rotate(-8deg);pointer-events:none;white-space:nowrap;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px;padding-right:54px;}
.card-name{font-family:'Black Han Sans',sans-serif;font-size:.95rem;letter-spacing:.02em;line-height:1.2;}
.card-ratings{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.rating-row{display:flex;align-items:center;gap:3px;font-size:.68rem;white-space:nowrap;}
.rating-row .who{font-weight:700;min-width:13px;}
.rating-overall{font-size:.82rem;color:var(--gold);font-weight:700;margin-top:2px;}
.card-price-info{font-size:.7rem;color:var(--gold);margin-top:2px;text-align:right;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.tag{font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:20px;}
.tag-genre{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3);}
.tag-char{background:rgba(45,206,122,.1);color:var(--green);border:1px solid rgba(45,206,122,.25);}
.tag-region{background:rgba(79,163,224,.1);color:var(--blue);border:1px solid rgba(79,163,224,.25);}
.tag-visits{background:rgba(230,57,70,.1);color:var(--red);border:1px solid rgba(230,57,70,.3);}
.card-info{font-size:.7rem;color:var(--text-muted);margin-bottom:2px;}
.card-menu-line{font-size:.7rem;color:var(--text-dim);margin-top:2px;}
.card-memo{font-size:.69rem;color:var(--text-dim);line-height:1.5;margin-top:2px;font-style:italic;}
.card-visits{margin-top:7px;border-top:1px solid var(--border);padding-top:7px;}
.visit-entry{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 9px;margin-bottom:4px;}
.visit-entry:last-child{margin-bottom:0;}
.ve-header{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.ve-num{font-size:.6rem;font-weight:700;background:var(--red-dim);color:var(--red);border-radius:4px;padding:1px 5px;}
.ve-date{font-size:.65rem;color:var(--text-muted);}
.ve-memo{font-size:.68rem;color:var(--text-dim);margin-bottom:3px;font-style:italic;}
.ve-ratings{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ve-rating{font-size:.65rem;display:flex;align-items:center;gap:2px;}
.ve-stars{color:var(--gold);font-size:.63rem;}
.ve-menus{font-size:.65rem;color:var(--text-dim);margin-top:2px;}
.ve-price{font-size:.65rem;color:var(--gold);margin-top:2px;}
.card-actions{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}

.srch-item{padding:11px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .18s;background:var(--surface2);}
.srch-item:hover{border-color:var(--red);background:rgba(230,57,70,.05);}
.srch-item .si-name{font-weight:700;font-size:.86rem;margin-bottom:2px;}
.srch-item .si-cat{font-size:.7rem;color:var(--gold);margin-bottom:2px;}
.srch-item .si-addr{font-size:.68rem;color:var(--text-muted);}
.empty{text-align:center;padding:48px 20px;}
.empty .e-icon{font-size:2.6rem;margin-bottom:12px;opacity:.6;}
.empty p{font-size:.8rem;line-height:1.7;color:var(--text-muted);}

#map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.map-popup{position:absolute;bottom:28px;left:24px;width:310px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;z-index:100;box-shadow:0 12px 48px rgba(0,0,0,.6);display:none;animation:popUp .22s cubic-bezier(.34,1.56,.64,1);}
.map-popup.show{display:block;}
@keyframes popUp{from{opacity:0;transform:translateY(12px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.popup-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-dim);font-size:1.1rem;cursor:pointer;}
.popup-close:hover{color:var(--red);}
.popup-name{font-family:'Black Han Sans',sans-serif;font-size:1.05rem;margin-bottom:3px;padding-right:22px;}
.popup-cat{font-size:.73rem;color:var(--gold);margin-bottom:5px;}
.popup-addr{font-size:.72rem;color:var(--text-muted);margin-bottom:3px;}
.popup-phone{font-size:.72rem;color:var(--text-muted);margin-bottom:14px;}
.popup-actions{display:flex;gap:8px;}

/* 지도 마커 */
.k-marker{background:var(--surface);color:var(--text);font-family:'Black Han Sans',sans-serif;font-size:.62rem;padding:3px 8px;border-radius:12px;white-space:nowrap;border:2px solid var(--red);box-shadow:0 2px 8px rgba(0,0,0,.5);display:flex;align-items:center;gap:4px;}
.k-marker .km-name{color:var(--text);}
.k-marker .km-star{color:var(--gold);font-size:.6rem;}

/* ━━━ MODAL ━━━ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:560px;max-width:95vw;max-height:92dvh;overflow-y:auto;padding:26px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.7);animation:modalIn .22s cubic-bezier(.34,1.56,.64,1);scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
@keyframes modalIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text-dim);font-size:1.25rem;cursor:pointer;}
.modal-close:hover{color:var(--red);}
.modal-title{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px;}
.modal-sub{font-size:.74rem;color:var(--text-muted);margin-bottom:18px;}

.form-group{margin-bottom:13px;}
.form-group label{display:block;font-size:.68rem;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:inherit;font-size:.86rem;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-group textarea{resize:vertical;min-height:64px;}
.form-group select option{background:var(--surface2);}
.form-row{display:flex;gap:10px;}.form-row .form-group{flex:1;}
.region-hint{font-size:.66rem;color:var(--green);margin-top:3px;}

/* STAR PICKER */
.star-picker{display:flex;gap:2px;padding:3px 0;user-select:none;}
.star-picker.sm .star-wrap{width:1.5rem;height:1.5rem;}
.star-picker.sm .star-bg,.star-picker.sm .star-fill{font-size:1.35rem;}
.star-wrap{position:relative;width:2.1rem;height:2.1rem;cursor:pointer;flex-shrink:0;}
.star-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.9rem;color:var(--border);}
.star-fill{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.9rem;color:var(--gold);overflow:hidden;width:0%;transition:width .1s;}
.half-l{position:absolute;left:0;top:0;width:50%;height:100%;z-index:2;}
.half-r{position:absolute;right:0;top:0;width:50%;height:100%;z-index:2;}

.dual-rating{display:flex;gap:14px;margin-top:4px;}
.rater{flex:1;}
.rater-label{font-size:.73rem;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-h{background:var(--blue);}.dot-b{background:var(--purple);}
.avg-line{font-size:.76rem;color:var(--text-muted);margin-top:7px;}
.avg-line strong{color:var(--gold);}

/* MENU */
.menu-rows{display:flex;flex-direction:column;gap:5px;margin-bottom:5px;}
.menu-row{display:flex;gap:5px;align-items:center;}
.menu-row .mi{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--text);font-family:inherit;font-size:.8rem;outline:none;}
.menu-row .mi:focus{border-color:var(--gold);}
.menu-row .pi{width:95px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--text);font-family:inherit;font-size:.8rem;outline:none;text-align:right;}
.menu-row .pi:focus{border-color:var(--gold);}
.xbtn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.95rem;padding:4px 5px;transition:color .15s;flex-shrink:0;}
.xbtn:hover{color:var(--red);}
.menu-total{font-size:.76rem;color:var(--gold);text-align:right;padding:3px 0;font-weight:700;}
.per-person{font-size:.73rem;color:var(--text-muted);text-align:right;padding-bottom:3px;}

.dashed-btn{font-size:.73rem;background:none;border:1px dashed var(--border);border-radius:7px;padding:5px 11px;cursor:pointer;width:100%;transition:all .2s;font-family:inherit;margin-top:3px;}
.dashed-btn.blue{color:var(--blue);}.dashed-btn.blue:hover{border-color:var(--blue);background:rgba(79,163,224,.07);}
.dashed-btn.green{color:var(--green);}.dashed-btn.green:hover{border-color:var(--green);background:rgba(45,206,122,.07);}

/* VISIT BLOCK */
.visit-blocks{display:flex;flex-direction:column;gap:9px;margin-bottom:7px;}
.visit-block{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;position:relative;}
.visit-block-header{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.vb-num{font-size:.63rem;font-weight:700;background:var(--red-dim);color:var(--red);border-radius:5px;padding:2px 6px;flex-shrink:0;}
.vb-date-inp{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text-muted);font-size:.76rem;font-family:inherit;outline:none;padding:2px 3px;cursor:pointer;}
.vb-date-inp:focus{border-bottom-color:var(--gold);}
.visit-block>.xbtn{position:absolute;top:9px;right:9px;}
.vb-memo-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:.78rem;font-family:inherit;outline:none;padding:2px 3px;margin-bottom:9px;}
.vb-memo-inp:focus{border-bottom-color:var(--gold);}
.vb-memo-inp::placeholder{color:var(--text-dim);}
.vb-section{font-size:.65rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.vb-dual{display:flex;gap:10px;margin-bottom:7px;}
.vb-rater{flex:1;}
.vb-rater-label{font-size:.68rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.vb-val{font-size:.66rem;margin-top:2px;}

.sec{font-size:.68rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;padding:9px 0 5px;border-top:1px solid var(--border);margin-top:3px;}
.stats-bar{padding:6px 11px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:10px;font-size:.68rem;color:var(--text-muted);align-items:center;flex-wrap:wrap;}
.stats-bar strong{color:var(--gold);}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--red);color:var(--text);padding:11px 16px;border-radius:10px;font-size:.8rem;z-index:1000;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<header>
  <div class="logo">🍜 맛집지도</div>
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="음식점 이름이나 지역으로 검색"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn btn-red" onclick="doSearch()">검색</button>
  </div>
  <button class="btn btn-gold" onclick="openModal(null)" style="margin-left:auto">＋ 직접 추가</button>
</header>

<div class="main-layout">
  <div class="sidebar">
    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">⭐ 내 맛집</div>
      <div class="tab" onclick="switchTab(1)">🔍 검색결과</div>
    </div>
    <div class="tab-panel active" id="panel0">
      <div class="filters">
        <select id="fGenre" onchange="renderList()">
          <option value="">장르 전체</option>
          <option>한식</option><option>일식</option><option>중식</option><option>양식</option>
          <option>분식/떡볶이</option><option>카페/디저트</option><option>술집/이자카야</option>
          <option>패스트푸드</option><option>기타</option>
        </select>
        <select id="fRegion" onchange="renderList()">
          <option value="">지역 전체</option>
          <optgroup label="서울 강남권"><option>강남</option><option>역삼/선릉</option><option>서초/교대</option><option>방배/사당</option><option>청담/압구정</option><option>잠실/송파</option></optgroup>
          <optgroup label="서울 도심"><option>종로/광화문</option><option>을지로/명동</option><option>이태원/한남</option><option>용산</option></optgroup>
          <optgroup label="서울 서북권"><option>홍대/합정</option><option>마포/공덕</option><option>신촌/연대</option><option>망원/상수</option></optgroup>
          <optgroup label="서울 동북권"><option>성수/뚝섬</option><option>건대/광진</option><option>왕십리/마장</option><option>노원/도봉</option></optgroup>
          <optgroup label="서울 기타"><option>여의도/영등포</option><option>신림/관악</option><option>구로/신도림</option></optgroup>
          <optgroup label="수도권"><option>판교/분당</option><option>수원</option><option>인천</option><option>일산/고양</option></optgroup>
          <optgroup label="지방"><option>부산</option><option>대구</option><option>광주</option><option>대전</option><option>제주</option></optgroup>
          <option>기타</option>
        </select>
        <select id="fSort" onchange="renderList()">
          <option value="date">최신순</option>
          <option value="rating_desc">별점 높은순</option>
          <option value="rating_asc">별점 낮은순</option>
          <option value="name">이름순</option>
          <option value="visits_desc">방문 많은순</option>
          <option value="price_asc">가격 낮은순</option>
          <option value="price_desc">가격 높은순</option>
        </select>
        <select id="fRating" onchange="renderList()">
          <option value="">별점 전체</option>
          <option value="4.5">4.5★ 이상</option>
          <option value="4">4.0★ 이상</option>
          <option value="3.5">3.5★ 이상</option>
          <option value="3">3.0★ 이상</option>
          <option value="low2">2.0★ 이하</option>
        </select>
        <button class="btn btn-stamp btn-sm" id="btnRevisit" onclick="toggleRevisit()">🔴 또간집만</button>
      </div>
      <div class="stats-bar" id="statsBar">저장된 맛집이 없습니다.</div>
      <div class="scroll-area" id="restList"></div>
    </div>
    <div class="tab-panel" id="panel1">
      <div style="padding:9px 13px;font-size:.72rem;color:var(--text-muted);border-bottom:1px solid var(--border);">가게를 클릭하면 지도에서 위치를 확인하고 저장할 수 있어요.</div>
      <div class="scroll-area" id="searchList">
        <div class="empty"><div class="e-icon">🔍</div><p>상단 검색창을 이용해보세요.</p></div>
      </div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>

function guessRegion(addr){
  if(!addr)return'';
  for(const[keys,region]of REGION_MAP){
    if(keys.some(k=>addr.includes(k)))return region;
  }
  return'기타';
}

function onAddrInput(val){
  if(!val)return;
  const guessed=guessRegion(val);
  if(guessed){
    const sel=document.getElementById('mRegion');
    // 해당 option이 있으면 자동 선택
    const opt=[...sel.options].find(o=>o.value===guessed);
    if(opt){
      sel.value=guessed;
      document.getElementById('regionHint').textContent='✓ 자동 분류: '+guessed;
    }
  }
}

/* ━━━ 1인 가격 계산 ━━━ */
function calcPerPerson(menusArr,totalId,perPersonId){
  const total=menusArr.reduce((s,m)=>s+(m.price||0),0);
  const tEl=document.getElementById(totalId);
  const pEl=document.getElementById(perPersonId);
  if(tEl)tEl.textContent=menusArr.length&&total?'합계(2인): '+total.toLocaleString()+'원':'';
  if(pEl)pEl.textContent=menusArr.length&&total?'1인: '+(Math.round(total/2)).toLocaleString()+'원':'';
  return total;
}

function getPerPersonAmt(menusArr){
  const t=menusArr.reduce((s,m)=>s+(m.price||0),0);
  return t>0?Math.round(t/2):0;
}

/* 전체 방문 평균 1인 가격 계산 */
function calcOverallPerPerson(r){
  const allMenus=[];
  if(r.menus&&r.menus.length)allMenus.push(r.menus);
  (r.visits||[]).forEach(v=>{if(v.menus&&v.menus.length)allMenus.push(v.menus);});
  if(!allMenus.length)return 0;
  const perVisit=allMenus.map(getPerPersonAmt).filter(v=>v>0);
  if(!perVisit.length)return 0;
  return Math.round(perVisit.reduce((s,v)=>s+v,0)/perVisit.length);
}

/* 1인 가격 → 가격대 레이블 */
function priceTier(amt){
  if(!amt)return'';
  if(amt<10000)return'~1만원';
  if(amt<20000)return'1~2만원';
  if(amt<30000)return'2~3만원';
  if(amt<50000)return'3~5만원';
  return'5만원~';
}
const PRICE_ORD={'~1만원':1,'1~2만원':2,'2~3만원':3,'3~5만원':4,'5만원~':5};

function buildPicker(wrId,dispId,init,onChg,small){
  const wr=document.getElementById(wrId);if(!wr)return;
  wr.innerHTML='';if(small)wr.classList.add('sm');else wr.classList.remove('sm');
  let cur=init??3.0;const fills=[];
  for(let i=1;i<=5;i++){
    const sw=document.createElement('div');sw.className='star-wrap';
    const bg=document.createElement('div');bg.className='star-bg';bg.textContent='★';
    const fi=document.createElement('div');fi.className='star-fill';fi.textContent='★';
    const hl=document.createElement('div');hl.className='half-l';
    const hr=document.createElement('div');hr.className='half-r';
    sw.append(bg,fi,hl,hr);wr.appendChild(sw);fills.push({fi,i});
    const upd=v=>fills.forEach(({fi:f,i:idx})=>{f.style.width=v>=idx?'100%':v>=idx-.5?'50%':'0%';});
    const set=v=>{cur=v;if(dispId){const el=document.getElementById(dispId);if(el)el.textContent=v.toFixed(1);}upd(v);onChg&&onChg(v);};
    hl.addEventListener('click',()=>set(i-.5));
    hr.addEventListener('click',()=>set(i));
    hl.addEventListener('mouseenter',()=>upd(i-.5));
    hr.addEventListener('mouseenter',()=>upd(i));
    hl.addEventListener('mouseleave',()=>upd(cur));
    hr.addEventListener('mouseleave',()=>upd(cur));
    if(i===5)set(cur);
  }
}

function stars(v){

    else if(v>=i-.5)h+='<span style="background:linear-gradient(90deg,var(--gold) 50%,var(--border) 50%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">★</span>';
    else h+='<span style="color:var(--border)">★</span>';
  }
  return h;
}

/* ━━━ 전체 방문 평균 별점 계산 ━━━ */
function calcOverallRating(r){
  // 모든 방문의 (혁+별)/2 평균
  const rounds=[];
  const firstAvg=r.ratingHyuk!=null&&r.ratingByul!=null?(r.ratingHyuk+r.ratingByul)/2:r.rating||0;
  if(firstAvg)rounds.push(firstAvg);
  (r.visits||[]).forEach(v=>{
    if(v.rH!=null&&v.rB!=null)rounds.push((v.rH+v.rB)/2);
    else if(v.rH!=null)rounds.push(v.rH);
    else if(v.rB!=null)rounds.push(v.rB);
  });
  if(!rounds.length)return(r.rating||0);
  return rounds.reduce((s,v)=>s+v,0)/rounds.length;
}

      <button class="xbtn" onclick="removeMenu(${i})">✕</button>`;
    wr.appendChild(row);

  calcPerPerson(_menus,'menuTotal','perPerson');
}

function autoPriceTier(){
  const pp=getPerPersonAmt(_menus);
  if(pp>0){
    const tier=priceTier(pp);
    const sel=document.getElementById('mPrice');
    if(sel)[...sel.options].forEach(o=>{if(o.value===tier)sel.value=tier;});
  }
}

/* ━━━ 재방문 블록 ━━━ */
function renderVisits(){
  const wr=document.getElementById('visitBlocks');wr.innerHTML='';
  _visits.forEach((v,vi)=>{
    const block=document.createElement('div');block.className='visit-block';
    block.innerHTML=`
      <div class="visit-block-header">
        <span class="vb-num">${vi+2}번째 방문</span>
        <input type="date" class="vb-date-inp" value="${v.date||''}" oninput="_visits[${vi}].date=this.value">
        <button class="xbtn" onclick="removeVisit(${vi})">✕</button>
      </div>
      <input type="text" class="vb-memo-inp" placeholder="방문 메모 (예: 런치, 웨이팅 20분)" value="${esc(v.memo)}" oninput="_visits[${vi}].memo=this.value">
      <div class="vb-section">별점</div>
      <div class="vb-dual">
        <div class="vb-rater">
          <div class="vb-rater-label"><span class="dot dot-h"></span>혁</div>
          <div class="star-picker sm" id="vspH_${vi}"></div>
          <div class="vb-val" style="color:var(--blue)">선택: <strong id="vvH_${vi}">${(v.rH??3).toFixed(1)}</strong>★</div>
        </div>
        <div class="vb-rater">
          <div class="vb-rater-label"><span class="dot dot-b"></span>별</div>
          <div class="star-picker sm" id="vspB_${vi}"></div>
          <div class="vb-val" style="color:var(--purple)">선택: <strong id="vvB_${vi}">${(v.rB??3).toFixed(1)}</strong>★</div>
        </div>
      </div>
      <div class="vb-section">메뉴 &amp; 가격 (2인 기준)</div>
      <div class="menu-rows" id="vmr_${vi}"></div>
      <div class="menu-total" id="vmt_${vi}"></div>
      <div class="per-person" id="vpp_${vi}"></div>
      <button class="dashed-btn blue" style="margin-top:3px" onclick="addVMenu(${vi})">＋ 메뉴 추가</button>`;
    wr.appendChild(block);
    buildPicker(`vspH_${vi}`,`vvH_${vi}`,v.rH??3.0,val=>{_visits[vi].rH=val;},true);
    buildPicker(`vspB_${vi}`,`vvB_${vi}`,v.rB??3.0,val=>{_visits[vi].rB=val;},true);
    renderVMenus(vi);
  });
}
function addVisit(){_visits.push({date:new Date().toISOString().slice(0,10),memo:'',rH:3.0,rB:3.0,menus:[]});renderVisits();}
function removeVisit(i){_visits.splice(i,1);renderVisits();}
function renderVMenus(vi){
  const wr=document.getElementById(`vmr_${vi}`);if(!wr)return;
  wr.innerHTML='';
  (_visits[vi].menus||[]).forEach((m,mi)=>{
    const row=document.createElement('div');row.className='menu-row';
    row.innerHTML=`<input class="mi" type="text" placeholder="메뉴명" value="${esc(m.name)}" oninput="_visits[${vi}].menus[${mi}].name=this.value">
      <input class="pi" type="number" placeholder="가격(원)" value="${m.price||''}" oninput="_visits[${vi}].menus[${mi}].price=+this.value||0;calcPerPerson(_visits[${vi}].menus,'vmt_${vi}','vpp_${vi}')">
      <button class="xbtn" onclick="removeVMenu(${vi},${mi})">✕</button>`;
    wr.appendChild(row);
  });
  calcPerPerson(_visits[vi].menus,`vmt_${vi}`,`vpp_${vi}`);
}
function addVMenu(vi){if(!_visits[vi].menus)_visits[vi].menus=[];_visits[vi].menus.push({name:'',price:0});renderVMenus(vi);}
function removeVMenu(vi,mi){_visits[vi].menus.splice(mi,1);renderVMenus(vi);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}

/* ━━━ 카카오맵 ━━━ */
function initMap(){
  map=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(37.5665,126.9780),level:7});
  ps=new kakao.maps.services.Places();geocoder=new kakao.maps.services.Geocoder();
  kakao.maps.event.addListener(map,'click',e=>searchNearby(e.latLng));
  renderList();renderSavedMarkers();
  setTimeout(()=>{const h=document.getElementById('mapHint');if(h)h.style.opacity='0';},5000);
}

function doSearch(){
  const kw=document.getElementById('searchInput').value.trim();if(!kw)return;
  if(!ps){alert('지도 로딩 중입니다.');return;}
  switchTab(1);document.getElementById('searchList').innerHTML='<div class="empty"><div class="e-icon">⏳</div><p>검색 중...</p></div>';
  clearSrchMk();
  ps.keywordSearch(kw,(data,status)=>{
    if(status===kakao.maps.services.Status.OK)renderSrchList(data);
    else document.getElementById('searchList').innerHTML='<div class="empty"><div class="e-icon">😢</div><p>검색 결과가 없습니다.</p></div>';
  });
}
function renderSrchList(places){
  const bounds=new kakao.maps.LatLngBounds();
  const listEl=document.getElementById('searchList');listEl.innerHTML='';
  places.forEach(p=>{
    const pos=new kakao.maps.LatLng(p.y,p.x);bounds.extend(pos);
    const mk=new kakao.maps.Marker({map,position:pos});searchMarkers.push(mk);
    kakao.maps.event.addListener(mk,'click',()=>{showPopup(p);map.panTo(pos);});
    const el=document.createElement('div');el.className='srch-item';
    el.innerHTML=`<div class="si-name">${p.place_name}</div><div class="si-cat">${p.category_name||'—'}</div><div class="si-addr">${p.road_address_name||p.address_name}</div>`;
    el.onclick=()=>{showPopup(p);map.panTo(pos);map.setLevel(4);};
    listEl.appendChild(el);
  });
  map.setBounds(bounds);
}
function clearSrchMk(){searchMarkers.forEach(m=>m.setMap(null));searchMarkers=[];}

function searchNearby(latlng){
  if(!ps)return;nearbyMarkers.forEach(m=>m.setMap(null));nearbyMarkers=[];closePopup();
  if(clickMarker)clickMarker.setMap(null);
  clickMarker=new kakao.maps.Marker({map,position:latlng});
  ps.categorySearch('FD6',(data,status)=>{
    if(status!==kakao.maps.services.Status.OK)return;
    switchTab(1);
    const listEl=document.getElementById('searchList');
    listEl.innerHTML=`<div style="padding:9px 12px;font-size:.72rem;color:var(--gold);border-bottom:1px solid var(--border);">📍 주변 음식점 ${data.length}곳</div>`;
    data.forEach(p=>{
      const pos=new kakao.maps.LatLng(p.y,p.x);
      const mk=new kakao.maps.Marker({map,position:pos});nearbyMarkers.push(mk);
      kakao.maps.event.addListener(mk,'click',()=>{showPopup(p);map.panTo(pos);});
      const el=document.createElement('div');el.className='srch-item';
      el.innerHTML=`<div class="si-name">${p.place_name}</div><div class="si-cat">${p.category_name||'—'}</div><div class="si-addr">${p.road_address_name||p.address_name}</div>`;
      el.onclick=()=>{showPopup(p);map.panTo(pos);map.setLevel(3);};
      listEl.appendChild(el);
    });
  },{location:latlng,radius:300,sort:kakao.maps.services.SortBy.DISTANCE});
}

function showPopup(p){
  currentSearchPlace=p;
  document.getElementById('ppName').textContent=p.place_name;
  document.getElementById('ppCat').textContent=p.category_name||'';
  document.getElementById('ppAddr').textContent='📍 '+(p.road_address_name||p.address_name||'');
  document.getElementById('ppPhone').textContent=p.phone?'📞 '+p.phone:'';
  document.getElementById('mapPopup').classList.add('show');
}
function closePopup(){document.getElementById('mapPopup').classList.remove('show');currentSearchPlace=null;}
function saveFromPopup(){if(!currentSearchPlace)return;openModal(currentSearchPlace);closePopup();}

/* ━━━ 저장된 마커 (이름 + 평균별점) ━━━ */
function renderSavedMarkers(){
  if(!map)return;
  Object.values(savedMarkerMap).forEach(({marker,overlay})=>{marker.setMap(null);if(overlay)overlay.setMap(null);});
  savedMarkerMap={};
  _db.forEach(r=>{
    if(!r.lat||!r.lng)return;
    const pos=new kakao.maps.LatLng(parseFloat(r.lat),parseFloat(r.lng));
    const marker=new kakao.maps.Marker({map,position:pos});
    const overallRating=calcOverallRating(r).toFixed(1);
    const content=`<div class="k-marker"><span class="km-name">${r.name}</span><span class="km-star">★${overallRating}</span></div>`;
    const overlay=new kakao.maps.CustomOverlay({position:pos,content,yAnchor:2.8,zIndex:3});
    overlay.setMap(map);savedMarkerMap[r.id]={marker,overlay};
    kakao.maps.event.addListener(marker,'click',()=>{
      switchTab(0);const card=document.getElementById('card-'+r.id);
      if(card){card.scrollIntoView({behavior:'smooth',block:'center'});card.classList.add('selected');setTimeout(()=>card.classList.remove('selected'),2200);}
    });
  });
}

/* ━━━ 또간집 토글 ━━━ */
function toggleRevisit(){
  _showRevisitOnly=!_showRevisitOnly;
  const btn=document.getElementById('btnRevisit');
  btn.classList.toggle('active',_showRevisitOnly);
  renderList();
}

/* ━━━ 목록 렌더링 ━━━ */
function renderList(){
  let data=[..._db];
  const genre=document.getElementById('fGenre')?.value||'';
  const region=document.getElementById('fRegion')?.value||'';
  const sort=document.getElementById('fSort')?.value||'date';
  const ratingF=document.getElementById('fRating')?.value||'';

  if(genre)data=data.filter(r=>r.genre===genre);
  if(region)data=data.filter(r=>r.region===region);
  if(_showRevisitOnly)data=data.filter(r=>(r.visits||[]).length>0);
  if(ratingF==='low2')data=data.filter(r=>calcOverallRating(r)<=2);
  else if(ratingF)data=data.filter(r=>calcOverallRating(r)>=parseFloat(ratingF));

  switch(sort){
    case'rating_desc':data.sort((a,b)=>calcOverallRating(b)-calcOverallRating(a));break;
    case'rating_asc': data.sort((a,b)=>calcOverallRating(a)-calcOverallRating(b));break;
    case'name':       data.sort((a,b)=>(a.name||'').localeCompare(b.name||''));break;
    case'visits_desc':data.sort((a,b)=>((b.visits||[]).length)-((a.visits||[]).length));break;
    case'price_asc':  data.sort((a,b)=>calcOverallPerPerson(a)-calcOverallPerPerson(b));break;
    case'price_desc': data.sort((a,b)=>calcOverallPerPerson(b)-calcOverallPerPerson(a));break;
    default:          data.sort((a,b)=>(b.created_at?.seconds||0)-(a.created_at?.seconds||0));
  }

  const all=_db;
  const overallAvg=all.length?(all.reduce((s,r)=>s+calcOverallRating(r),0)/all.length).toFixed(1):'-';
  document.getElementById('statsBar').innerHTML=
    `총 <strong>${all.length}</strong>곳 · 전체 평균 <strong>${overallAvg}★</strong> · 현재 <strong>${data.length}</strong>곳${_showRevisitOnly?' <span style="color:var(--red)">또간집만</span>':''}`;

  const el=document.getElementById('restList');
  if(!data.length){el.innerHTML='<div class="empty"><div class="e-icon">🍽️</div><p>저장된 맛집이 없습니다.<br>검색 후 가게를 추가해보세요!</p></div>';return;}

  el.innerHTML=data.map(r=>{
    const rh=r.ratingHyuk??null,rb=r.ratingByul??null;
    const firstAvgR=rh!=null&&rb!=null?((rh+rb)/2).toFixed(1):rh!=null?rh.toFixed(1):rb!=null?rb.toFixed(1):(r.rating||0).toFixed(1);
    const overallR=calcOverallRating(r).toFixed(1);
    const visitCnt=(r.visits||[]).length;
    const isRevisit=visitCnt>0;
    const overallPP=calcOverallPerPerson(r);
    const firstPP=getPerPersonAmt(r.menus||[]);

    const menuLine=(r.menus&&r.menus.length)?`<div class="card-menu-line">🍽 ${r.menus.map(m=>m.name+(m.price?' ('+m.price.toLocaleString()+'원)':'')).join(' · ')}</div>`:'';

    const priceInfo=overallPP>0?`<div class="card-price-info">💴 1인 평균 ${overallPP.toLocaleString()}원${visitCnt>0?` (${visitCnt+1}회 평균)`:''}</div>`:'';

    const visitHtml=isRevisit?`<div class="card-visits">
      ${(r.visits||[]).map((v,vi)=>{
        const vAvg=v.rH!=null&&v.rB!=null?((v.rH+v.rB)/2).toFixed(1):'';
        const vPP=getPerPersonAmt(v.menus||[]);
        const vMenuLine=(v.menus&&v.menus.length)?`<div class="ve-menus">🍽 ${v.menus.map(m=>m.name+(m.price?' ('+m.price.toLocaleString()+'원)':'')).join(' · ')}</div>`:'';
        return`<div class="visit-entry">
          <div class="ve-header"><span class="ve-num">${vi+2}번째</span><span class="ve-date">${v.date||''}</span></div>
          ${v.memo?`<div class="ve-memo">${v.memo}</div>`:''}
          <div class="ve-ratings">
            ${v.rH!=null?`<div class="ve-rating"><span style="color:var(--blue);font-weight:700;font-size:.63rem">혁</span><span class="ve-stars">${stars(v.rH)}</span><span style="color:var(--blue)">${v.rH.toFixed(1)}</span></div>`:''}
            ${v.rB!=null?`<div class="ve-rating"><span style="color:var(--purple);font-weight:700;font-size:.63rem">별</span><span class="ve-stars">${stars(v.rB)}</span><span style="color:var(--purple)">${v.rB.toFixed(1)}</span></div>`:''}
            ${vAvg?`<div class="ve-rating" style="color:var(--gold);font-weight:700;margin-left:3px">평균 ${vAvg}★</div>`:''}
          </div>
          ${vMenuLine}
          ${vPP?`<div class="ve-price">💴 1인 ${vPP.toLocaleString()}원</div>`:''}
        </div>`;
      }).join('')}
    </div>`:'';

    return`<div class="rest-card" id="card-${r.id}" onclick="focusCard('${r.id}',${r.lat||0},${r.lng||0})">
      ${isRevisit?'<div class="stamp">또간집</div>':''}
      <div class="card-top">
        <div class="card-name">${r.name}</div>
        <div class="card-ratings">
          ${rh!=null?`<div class="rating-row"><span class="who" style="color:var(--blue)">혁</span><span>${stars(rh)}</span><span style="color:var(--blue);font-size:.66rem;margin-left:1px">${rh.toFixed(1)}</span></div>`:''}
          ${rb!=null?`<div class="rating-row"><span class="who" style="color:var(--purple)">별</span><span>${stars(rb)}</span><span style="color:var(--purple);font-size:.66rem;margin-left:1px">${rb.toFixed(1)}</span></div>`:''}
          <div class="rating-overall">${isRevisit?`전체 평균 ${overallR}★`:`평균 ${firstAvgR}★`}</div>
          ${priceInfo}
        </div>
      </div>
      <div class="card-tags">
        ${r.genre?`<span class="tag tag-genre">${r.genre}</span>`:''}
        ${r.char?`<span class="tag tag-char">${r.char}</span>`:''}
        ${r.region?`<span class="tag tag-region">${r.region}</span>`:''}
        ${isRevisit?`<span class="tag tag-visits">총 ${visitCnt+1}번 방문</span>`:''}
      </div>
      ${menuLine}
      ${r.address?`<div class="card-info">📍 ${r.address}</div>`:''}
      ${r.phone?`<div class="card-info">📞 ${r.phone}</div>`:''}
      ${r.memo?`<div class="card-memo">💬 ${r.memo}</div>`:''}
      ${visitHtml}
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${r.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRest('${r.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function focusCard(id,lat,lng){
  if(lat&&lng&&map){map.panTo(new kakao.maps.LatLng(lat,lng));map.setLevel(4);}
  document.querySelectorAll('.rest-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+id)?.classList.add('selected');
}

/* ━━━ 모달 ━━━ */
function initModal(){
  buildPicker('spH','vH',_rH,v=>{_rH=v;refreshAvg();});
  buildPicker('spB','vB',_rB,v=>{_rB=v;refreshAvg();});
  renderMenus();renderVisits();refreshAvg();
}

function openModal(place){
  document.getElementById('mEditId').value='';
  document.getElementById('mPlaceId').value=place?.id||'';
  document.getElementById('mLat').value=place?.y||'';
  document.getElementById('mLng').value=place?.x||'';
  document.getElementById('mName').value=place?.place_name||'';
  const addr=place?.road_address_name||place?.address_name||'';
  document.getElementById('mAddr').value=addr;
  document.getElementById('mPhone').value=place?.phone||'';
  ['mGenre','mRegion','mChar','mPrice'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mMemo').value='';
  document.getElementById('regionHint').textContent='';
  if(addr)onAddrInput(addr);
  _rH=3.0;_rB=3.0;_menus=[];_visits=[];
  initModal();
  document.getElementById('mTitle').textContent=place?'맛집 저장':'직접 추가';
  document.getElementById('mSub').textContent=place?`"${place.place_name}"에 평가를 남겨보세요.`:'가게 정보를 입력하세요.';
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('mName').focus();
}

function openEditModal(id){
  const r=_db.find(x=>x.id===id);if(!r)return;
  document.getElementById('mEditId').value=r.id;
  document.getElementById('mPlaceId').value=r.placeId||'';
  document.getElementById('mLat').value=r.lat||'';
  document.getElementById('mLng').value=r.lng||'';
  document.getElementById('mName').value=r.name;
  document.getElementById('mAddr').value=r.address||'';
  document.getElementById('mPhone').value=r.phone||'';
  document.getElementById('mGenre').value=r.genre||'';
  document.getElementById('mRegion').value=r.region||'';
  document.getElementById('mChar').value=r.char||'';
  document.getElementById('mPrice').value=r.price||'';
  document.getElementById('mMemo').value=r.memo||'';
  document.getElementById('regionHint').textContent='';
  _rH=r.ratingHyuk??3.0;_rB=r.ratingByul??3.0;
  _menus=(r.menus||[]).map(m=>({...m}));
  _visits=(r.visits||[]).map(v=>({...v,menus:(v.menus||[]).map(m=>({...m}))}));
  initModal();
  document.getElementById('mTitle').textContent='맛집 수정';
  document.getElementById('mSub').textContent=`"${r.name}" 수정`;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

function saveRest(){
  const name=document.getElementById('mName').value.trim();
  if(!name){toast('가게 이름을 입력해주세요.');return;}
  const avgR=parseFloat(((_rH+_rB)/2).toFixed(1));
  const firstPP=getPerPersonAmt(_menus);
  const entry={
    name,
    genre:document.getElementById('mGenre').value,
    region:document.getElementById('mRegion').value,
    char:document.getElementById('mChar').value,
    price:document.getElementById('mPrice').value||(firstPP?priceTier(firstPP):''),
    ratingHyuk:_rH,ratingByul:_rB,rating:avgR,
    menus:_menus.filter(m=>m.name),
    visits:_visits.map(v=>({...v,menus:(v.menus||[]).filter(m=>m.name)})),
    address:document.getElementById('mAddr').value,
    lat:document.getElementById('mLat').value,
    lng:document.getElementById('mLng').value,
    phone:document.getElementById('mPhone').value,
    memo:document.getElementById('mMemo').value,
    placeId:document.getElementById('mPlaceId').value,
  };
  const editId=document.getElementById('mEditId').value;
  if(editId)window._FS.update(editId,entry).then(()=>toast('수정되었습니다 ✓'));
  else window._FS.add(entry).then(()=>toast('저장되었습니다 ✓'));
  closeModal();
}

function deleteRest(id){
  const r=_db.find(x=>x.id===id);
  if(!r||!confirm(`"${r.name}"을(를) 삭제할까요?`))return;
  window._FS.remove(id).then(()=>toast('삭제되었습니다.'));
}

function switchTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}
</script>
